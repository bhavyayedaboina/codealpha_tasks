<!DOCTYPE html>
<html>
<head>
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="stars"></div>  <!--for stars floating in the background of the music player -->

<div id="player">

   
   <div class="cover-container"> 
   
      <img id="cover">
       <div class="top-icons">
          <button class="sideBtn" id="volumeBtn">🔊️</button> 
    
          <button class="sideBtn" id="favBtn">🤍️</button> 
        </div>  
   </div>  
   <h3 id="favTitle"> ❤️ Favorite Songs</h3>
   <div id="favoriteList"></div>
   <div id="title-wrapper"> 
    <h2 id="title">Song Name</h2><br>
   </div> 
  <h3 id="artist"></h3>
  
  
  <audio id="audio"></audio>
  
  <div class="progress-container">
  
    <input type="range" id="progress">
  
     <div id="timer">
       <span id="currentTime">00:00</span>
       /
       <span id="duration">00:00</span>
    </div> 
    
  </div>
  
    
  <div class="volume-wrapper">

    <div class="volume-popup">
     <input type="range"
            id="volume" 
            min="0" 
            max="1" 
            step="0.5" 
            value="1">
   </div>  
  </div>
  <div class="buttons">
    <button id="prev">⏪️</button>
    <button id="play">▶️</button>
    <button id="next">⏩️</button>
    <button id="playlistBtn">🎵️</button>
  </div>
  
  <div id="playlist"></div>
  
</div>

<script src="script.js"></script>

</body>
</html>
